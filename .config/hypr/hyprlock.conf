background {
  monitor = 
  path = ~/Downloads/a_bird_flying_over_a_beach.jpg
  blur_passes = 2
  blur_size = 2 
  noise = 0.0117
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

# time 
label {
  monitor = 
  text = $TIME 
  color = rgba(255, 255, 255, 1)
  font_size = 200
  font_family = CaskaydiaCove NFM, CaskaydiaCove Nerd Font Mono 
  position = 0, 300 
  halign = center 
  valign = center 
}

# date 
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%B %d %Y")"
  color = rgba(255, 255, 255, 1)
  font_size = 40
  font_family = CaskaydiaCove NFM, CaskaydiaCove Nerd Font Mono 
  position = 0, 50
  halign = center 
  valign = center 
}


# day 
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%A")"
  color = rgba(255, 255, 255, 1)
  font_size = 40
  font_family = CaskaydiaCove NFM, CaskaydiaCove Nerd Font Mono 
  position = 500, 180
  halign = center 
  valign = center 
}

general {
  no_fade_in = false 
  grace = 0 
  disable_loading_bar = true 
}

# user 
label {
  monitor = 
  text = 
  color = $p3_accent_7_rgba
  font_size = 30
  font_family = 
  position = 0, -400
  halign = center 
  valign = center
}

# password 
input-field {
  monitor = 
  size = 200, 50
  outline_thickness = 3
  dots_size = 0.33
  dots_spacing = 0.15
  dots_center = center
  dots_rounding = -1
  outer_rounding = -1
  outer_color = rgba(255,255,255,1)
  inner_color = rgba(255, 255, 255, 0.8)
  font_color = rgba(0,0,0,1)
  fade_on_empty = true
  fade_timeout = 1000
  placeholder_text = <i>  Logged in as </i>$USER 
  hide_input = false
  rounding = -1
  fail_color = rgb(204, 34, 34)
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> 
  fail_transition = 300
  capslock_color = 1
  numlock_color = 1
  bothlock_color = -1 
  invert_numlock = false 
  swap_font_color = true 
  position = 0, -130
  halign = center 
  valign = center 
}
